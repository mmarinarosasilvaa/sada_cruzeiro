name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL base para os testes (vazio = staging padrão)'
        required: false
        default: ''
      environment:
        description: 'Ambiente alvo'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  e2e-chromium:
    name: E2E — Chromium + Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests (Chromium + Mobile)
        run: npm run test:e2e
        env:
          CI: true
          E2E_DISABLE_GPU: '1'
          PLAYWRIGHT_HTML_REPORT: playwright-report
          PW_TEST_HTML_REPORT_OPEN: never
          E2E_BASE_URL: ${{ github.event.inputs.base_url || (github.event.inputs.environment == 'production' && 'https://www.sadacruzeiro.com.br') || '' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-chromium
          path: playwright-report/
          retention-days: 30

  e2e-firefox:
    name: E2E — Firefox
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install firefox --with-deps

      - name: Run E2E tests (Firefox)
        run: npm run test:e2e:firefox
        env:
          CI: true
          E2E_DISABLE_GPU: '1'
          E2E_FIREFOX_STABLE: '1'
          E2E_STRICT_DESIGN: '0'
          PLAYWRIGHT_HTML_REPORT: playwright-report
          PW_TEST_HTML_REPORT_OPEN: never
          E2E_BASE_URL: ${{ github.event.inputs.base_url || '' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-firefox
          path: playwright-report/
          retention-days: 30
